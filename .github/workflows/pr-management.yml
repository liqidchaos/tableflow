name: PR Management

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    name: Triage PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Label by paths
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Ensure PR checklist comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- tableflow-pr-checklist -->';
            const body = `${marker}
            ## TableFlow PR checklist

            - [ ] CI (\`type-check\`, \`lint\`, \`test\`, E2E) is green
            - [ ] Guest path remains web-based (no mandatory app download)
            - [ ] Kitchen enqueue still requires successful payment
            - [ ] Preview deploy reviewed when UI changes

            Required status check on \`main\`: **CI / test**
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  enforce-ci-on-merge-ready:
    name: Require CI before merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Fail when CI is not succeeding on this SHA
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request.head.sha;
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
            });
            const ci = (data.check_runs || []).filter((r) =>
              r.name === 'test' || r.name.startsWith('CI') || r.name.includes('Type check')
            );
            // On first push, CI may still be queued — soft-pass with notice.
            if (ci.length === 0) {
              core.info('No CI check runs yet for this SHA; branch protection still gates merge.');
              return;
            }
            const failing = ci.filter((r) => r.conclusion && r.conclusion !== 'success' && r.status === 'completed');
            if (failing.length) {
              core.setFailed(`CI checks not green: ${failing.map((r) => `${r.name}=${r.conclusion}`).join(', ')}`);
            }
